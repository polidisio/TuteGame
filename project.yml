name: TuteGame
options:
  bundleIdPrefix: com.tunombre
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  TuteGame:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: folder
        buildPhase: resources
